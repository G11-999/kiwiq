# /etc/nginx/templates/default.conf.template
# This is a template file. Environment variables like ${YOUR_DOMAIN}
# will be substituted by `envsubst` in the entrypoint.sh script.

# --- HTTP Server Block ---
# Listens on port 80 for incoming HTTP requests
server {
    listen 80;
    # Listen for requests matching the specified domain name
    server_name ${YOUR_DOMAIN}; # e.g., myapp.example.com

    # --- Let's Encrypt ACME Challenge Handling ---
    # Special location block to handle requests for /.well-known/acme-challenge/
    # This is used by Certbot for the http-01 challenge to verify domain ownership.
    location /.well-known/acme-challenge/ {
        # Serve challenge files from this directory, which should be accessible by Certbot
        root /var/www/certbot;
        # Allow all access to this path
        allow all;
    }

    # --- Redirect HTTP to HTTPS ---
    # For all other requests on port 80, issue a permanent redirect (301) to HTTPS
    location / {
        # $host preserves the original host name requested by the client
        # $request_uri preserves the original path and query string
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS Server Block ---
# Listens on port 443 for incoming HTTPS requests
server {
    listen 443 ssl http2; # Enable SSL and HTTP/2
    server_name ${YOUR_DOMAIN};

    # --- SSL Certificate Configuration ---
    # Paths to the certificate and private key files managed by Certbot
    # These paths are specific to how Certbot stores certificates
    ssl_certificate /etc/letsencrypt/live/${YOUR_DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${YOUR_DOMAIN}/privkey.pem;

    # --- SSL Security Enhancements ---
    # Include standard SSL options provided by Let's Encrypt/Certbot
    # This file typically contains recommended cipher suites and protocols
    # Ensure this file exists at the specified path (Certbot usually creates it)
    include /etc/letsencrypt/options-ssl-nginx.conf;

    # Path to Diffie-Hellman parameters file for stronger key exchange
    # Generate this file if it doesn't exist (e.g., using openssl dhparam)
    # Certbot might generate this as well, check the /etc/letsencrypt directory
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # --- Optional: HTTP Strict Transport Security (HSTS) ---
    # Instructs browsers to always connect via HTTPS for the specified duration
    # Uncomment this *after* verifying HTTPS is working correctly
    # max-age=31536000 corresponds to 1 year
    # includeSubDomains applies the policy to all subdomains as well
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # --- Reverse Proxy Configuration ---
    # Main location block to proxy requests to the backend application
    location / {
        # The address of the backend application container (e.g., http://app:8000)
        # ${APP_HOST} and ${APP_PORT} are substituted from environment variables
        proxy_pass http://${APP_HOST}:${APP_PORT};

        # --- Proxy Headers ---
        # Set headers to pass information about the original request to the backend app
        proxy_set_header Host $host; # Pass the original host header
        proxy_set_header X-Real-IP $remote_addr; # Pass the real client IP address
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; # Append client IP to the list of proxies
        proxy_set_header X-Forwarded-Proto $scheme; # Pass the original protocol (http or https)

        # --- Proxy Timeouts ---
        # Increase timeouts to prevent premature connection closing for long-running requests
        proxy_connect_timeout       600s; # Max time to establish connection with the backend
        proxy_send_timeout          600s; # Max time to send data to the backend
        proxy_read_timeout          600s; # Max time to read data from the backend
        send_timeout                600s; # Max time the entire response can take

        # --- Optional: WebSocket Support ---
        # If your application uses WebSockets, uncomment these lines
        # proxy_http_version 1.1;
        # proxy_set_header Upgrade $http_upgrade;
        # proxy_set_header Connection "upgrade";
    }

    # --- Additional Nginx Configuration ---
    # Add other configurations as needed:
    # - Serving static files directly from Nginx
    # - Custom error pages
    # - Rate limiting
    # - Security headers (Content-Security-Policy, X-Frame-Options, etc.)
    # Example for static files:
    # location /static/ {
    #     alias /app/static/; # Adjust path to your static files
    #     expires 1d; # Cache static files for 1 day
    # }
} 