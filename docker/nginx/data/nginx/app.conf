# Define upstream for better connection handling
upstream app_backend {
    server app:8000 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# Define upstream for Prefect server
upstream prefect_backend {
    server prefect-server:4200 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# 0) Build a variable that's only set when $http_origin matches one of your allowed origins
map $http_origin $cors_origin {
    default "";
    "http://localhost:3000"                   $http_origin;
    "https://beta.kiwiq.ai"                   $http_origin;
    "https://kiwiq-frontend.vercel.app"       $http_origin;
    "https://kq-prefect-server.prod.kiwiq.ai" $http_origin;
}

# Map for WebSocket upgrade header
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# 1) Catch-all: any unmatched Host → kill the connection
server {
    listen 80  default_server;
    listen [::]:80 default_server;
    server_name _;
    return 444;
}

# 2) HTTP → HTTPS redirect for your real domain
server {
    listen 80;
    listen [::]:80;
    server_name api.prod.kiwiq.ai;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$server_name$request_uri;
    }
}

# 3) HTTPS proxy to your app
server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    http2 on;
    server_name api.prod.kiwiq.ai;

    ssl_certificate     /etc/letsencrypt/live/api.prod.kiwiq.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.prod.kiwiq.ai/privkey.pem;
    # If below commented files don't exist, leave them commented out
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;

    # Add resolver for Docker DNS
    resolver 127.0.0.11 valid=30s ipv6=off;
    resolver_timeout 5s;
    
    # Normalize URLs without external redirect
    rewrite ^/(.*)/$ /$1 last;
    # rewrite ^(.*)\?$ $1      last;

    location / {
        # CORS headers - always set, not just for OPTIONS
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Credentials "true" always;

        # Handle preflight requests
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With, X-Active-Org, X-XSRF-TOKEN, Cookie" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Max-Age 86400 always;
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }
        
        # Proxy settings
        # Proxy configuration
        proxy_pass http://app_backend;
        proxy_http_version 1.1;

        # Headers
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # Connection settings
        proxy_set_header Connection "";
        
        # Cookie handling - crucial for authentication
        proxy_set_header Cookie $http_cookie;
        proxy_pass_header Set-Cookie;
        
        
        # Buffer settings for better cookie handling
        proxy_buffer_size          128k;
        proxy_buffers              4 256k;
        proxy_busy_buffers_size    256k;

        # Just add this for very large responses
        proxy_max_temp_file_size   50m;     # For huge exports
        
        # CORS headers for actual requests
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With, X-Active-Org, X-XSRF-TOKEN, Cookie" always;
        add_header Access-Control-Expose-Headers "Set-Cookie" always;
    }

    # WebSocket support
    location /api/v1/ws/ {
        # Handle preflight for WebSocket endpoints
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With, X-Active-Org, X-XSRF-TOKEN, Cookie" always;
            add_header Access-Control-Allow-Credentials "true" always;
            return 204;
        }
        
        # WebSocket proxy
        proxy_pass http://app_backend;
        proxy_http_version 1.1;

        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        
        # Critical: Pass cookies to WebSocket endpoints
        proxy_set_header   Cookie            $http_cookie;
        proxy_pass_header  Set-Cookie;
        
        # WebSocket timeouts
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout 60s;
        
        # # WebSocket buffer sizes
        # proxy_buffer_size          128k;
        # proxy_buffers              4 256k;
        # proxy_busy_buffers_size    256k;
        # Optional: tweak buffer sizes if you see "upstream sent too big header" errors
        proxy_buffers 8 16k;
        proxy_buffer_size 16k;
        proxy_busy_buffers_size 32k;
        
        # CORS headers for WebSocket
        add_header Access-Control-Allow-Origin  $cors_origin always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Expose-Headers "Set-Cookie" always;
    }


    # Health check endpoint (no CORS needed)
    location /health {
        proxy_pass http://app_backend/health;
        proxy_set_header Host $http_host;
        access_log off;
    }
}

# 4) Prefect Server Subdomain - HTTP to HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name kq-prefect-server.prod.kiwiq.ai;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$server_name$request_uri;
    }
}

