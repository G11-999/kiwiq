# 1) Catch‑all: any unmatched Host → kill the connection
server {
    listen 80  default_server;
    listen [::]:80 default_server;
    server_name _;
    return 444;
}

# 2) HTTP → HTTPS redirect for your real domain
server {
    listen 80;
    listen [::]:80;
    server_name api.prod.kiwiq.ai;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$server_name$request_uri;
    }
}

# 3) HTTPS proxy to your app
server {
    listen 443 ssl http2 default_server;
    listen [::]:443 ssl http2 default_server;
    server_name api.prod.kiwiq.ai;

    ssl_certificate     /etc/letsencrypt/live/api.prod.kiwiq.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.prod.kiwiq.ai/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Set CORS headers for all responses
    add_header Access-Control-Allow-Origin "*";
    # add_header Access-Control-Allow-Origin "https://beta.kiwiq.ai" always;

    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With, X-Active-Org" always;
    add_header Access-Control-Allow-Credentials "true" always;
    
    # Handle OPTIONS requests for CORS preflight
    location / {
        # For preflight requests, just return a 200 response with CORS headers
        if ($request_method = 'OPTIONS') {
            # add_header Access-Control-Allow-Origin "*";
            # add_header Access-Control-Allow-Origin "https://beta.kiwiq.ai";
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With, X-Active-Org";
            add_header Access-Control-Allow-Credentials "true";
            return 204;  # No content for OPTIONS request
        }

        proxy_pass         http://app:8000;
        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;
    }
}
