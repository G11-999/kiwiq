############################################
# 0.  ALLOWED ORIGINS  – configure here   #
############################################
# Maps the request's Origin header ($http_origin) to $cors_allow_origin
# Only sets $cors_allow_origin if the Origin matches one we allow.
map $http_origin $cors_allow_origin {
    default 0; # Default to '0' (denied) if no match
    "http://localhost:3000"   $http_origin; # Allow dev frontend
    "https://beta.kiwiq.ai"   $http_origin; # Allow prod frontend
    # Add any other allowed origins here
}

############################################
# 1.  Catch-all – send bogus hosts away   #
############################################
server {
    listen 80  default_server;
    listen [::]:80 default_server;
    server_name _;
    return 444; # Close connection for unmatched hosts
}

############################################
# 2.  HTTP listener for real domain       #
#     * ACME challenge stays on :80       #
#     * Everything else → HTTPS           #
############################################
server {
    listen 80;
    listen [::]:80;
    server_name api.prod.kiwiq.ai;

    # Let Certbot reach this path unabated
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # REMOVED: Incorrect OPTIONS handling block was here.

    # Everything else redirects permanently to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

############################################
# 3.  HTTPS → FastAPI (Docker service “app”)
############################################
server {
    # Corrected listen directives (fixes deprecation warning)
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    http2 on; # Enable HTTP/2 separately

    server_name api.prod.kiwiq.ai;

    # SSL Configuration
    ssl_certificate     /etc/letsencrypt/live/api.prod.kiwiq.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.prod.kiwiq.ai/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf; # Contains strong SSL settings
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem; # Diffie-Hellman params

    # REMOVED: Global CORS headers were here - moved inside location

    location / {
        # --- Preflight Handling ---
        # Handles OPTIONS requests BEFORE they are proxied
        if ($request_method = OPTIONS) {
            # Check if the request Origin is in our allowed list (map result != '0')
            if ($cors_allow_origin != '0') {
                # Add headers required for successful CORS preflight
                add_header Access-Control-Allow-Origin      "$cors_allow_origin" always; # Echo back the allowed origin
                add_header Access-Control-Allow-Credentials "true"             always; # Allow credentials (cookies/auth)
                add_header Access-Control-Allow-Methods    "GET, POST, PUT, PATCH, DELETE, OPTIONS" always; # Allowed methods for actual request
                add_header Access-Control-Allow-Headers    "Authorization, Content-Type, X-Requested-With, X-Active-Org" always; # Allowed headers for actual request
                add_header Access-Control-Max-Age           86400            always; # Cache preflight response for 1 day
                add_header Vary                            Origin             always; # Crucial for caching proxies

                # Send '204 No Content' response
                add_header Content-Length 0;
                return 204;
            }
            # If Origin not allowed (map result was '0'), deny the preflight
            return 403 Forbidden;
        } # End OPTIONS handling

        # --- Actual Request Handling (non-OPTIONS) ---
        # For requests other than OPTIONS, add CORS headers if the origin is allowed.
        if ($cors_allow_origin != '0') {
            add_header Access-Control-Allow-Origin      "$cors_allow_origin" always;
            add_header Access-Control-Allow-Credentials "true"             always;
            add_header Vary                            Origin             always;
            # Optional: Expose headers from the backend response to the frontend JS
            # add_header Access-Control-Expose-Headers 'Content-Length, X-My-Custom-Response-Header' always;
        }

        # ---- Proxy to Backend Application ----
        proxy_pass http://app:8000;     # Your FastAPI container/upstream
        proxy_set_header Host              $host; # Pass original host
        proxy_set_header X-Real-IP         $remote_addr; # Pass real client IP
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for; # Pass proxy chain IPs
        proxy_set_header X-Forwarded-Proto $scheme; # Pass original scheme (http/https)

        # Optional: Recommended proxy settings
        proxy_redirect     off; # Do not let backend rewrite redirects
        proxy_http_version 1.1; # Use HTTP/1.1 for backend connection
        proxy_set_header   Upgrade $http_upgrade; # For WebSockets
        proxy_set_header   Connection "upgrade"; # For WebSockets
        proxy_read_timeout 86400s; # Adjust timeout as needed
        proxy_send_timeout 86400s; # Adjust timeout as needed
    }
}
