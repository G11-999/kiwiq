
# 0) Build a variable that’s only set when $http_origin matches one of your allowed origins
map $http_origin $cors_origin {
    default "";
    "http://localhost:3000"                   $http_origin;
    "https://beta.kiwiq.ai"                   $http_origin;
    "https://kiwiq-frontend.vercel.app"       $http_origin;
}

# 1) Catch-all: any unmatched Host → kill the connection
server {
    listen 80  default_server;
    listen [::]:80 default_server;
    server_name _;
    return 444;
}

# 2) HTTP → HTTPS redirect for your real domain
server {
    listen 80;
    listen [::]:80;
    server_name api.prod.kiwiq.ai;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$server_name$request_uri;
    }
}

# 3) HTTPS proxy to your app
server {
    listen 443 ssl http2 default_server;
    listen [::]:443 ssl http2 default_server;
    server_name api.prod.kiwiq.ai;

    ssl_certificate     /etc/letsencrypt/live/api.prod.kiwiq.ai-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.prod.kiwiq.ai-0001/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # --- CORS: use the mapped $cors_origin variable ---
    add_header Access-Control-Allow-Origin  $cors_origin          always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With, X-Active-Org" always;
    add_header Access-Control-Allow-Credentials "true"              always;

    # Normalize URLs without external redirect
    rewrite ^/(.*)/$ /$1 last;
    rewrite ^(.*)\?$ $1      last;

    location / {

        # Handle preflight at the top level (before proxying)
        if ($request_method = OPTIONS) {
            # echo back the same $cors_origin
            add_header Access-Control-Allow-Origin  $cors_origin;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With, X-Active-Org";
            add_header Access-Control-Allow-Credentials "true";
            return 204;
        }
        
        proxy_pass         http://app:8000;
        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;
    }
}

