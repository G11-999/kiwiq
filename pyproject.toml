openai = "^1.102.0"
gunicorn = "^23.0.0"
fireworks = "^2.0.4"
scrapy = "^2.13.3"
playwright = "^1.53.0"
protego = "^0.5.0"
ultimate-sitemap-parser = "^1.4.0"
feedparser = "^6.0.11"
psutil = "^7.0.0"
flask = "^3.1.1"
tabulate = "^0.9.0"
trafilatura = "^2.0.0"

[tool.poetry.group.dev.dependencies]
black = "^25.1.0"
isort = "^6.0.1"
mypy = "^1.15.0"
pytest-cov = "^6.0.0"
respx = "^0.22.0"
pytest-env = "^1.1.5"
ipdb = "^0.13.13"
pytest = "^8.3.5"
kiwi_client = { path = "./standalone_test_client", develop = true }

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.black]
line-length = 88
target-version = ['py312']

[tool.isort]
profile = "black"
multi_line_output = 3
