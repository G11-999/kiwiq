[tool.poetry]
name = "kiwiq-ai"
version = "0.1.0"
description = "KiwiQ AI Platform"
authors = ["Your Name <your.email@example.com>"]
readme = "README.md"
package-mode = false
# packages = [{include = "global_config", from = "libs"}]

[tool.poetry.dependencies]
python = ">=3.12,<3.14"
fastapi = "^0.115.12"
uvicorn = "^0.27.0"
pydantic = "^2.11.1"
pydantic-settings = "^2.1.0"
structlog = "^25.2.0"
websockets = "^15.0.1"
