python-multipart = "^0.0.20"
itsdangerous = "^2.2.0"
redis = "^5.2.1"
msgpack = "^1.1.0"
orjson = "^3.10.16"
dotenv = "^0.9.9"
##################################################
# Include local libraries as editable dependencies
libs = { path = "./libs", develop = true }
##################################################
linkedin-api-client = "^0.3.0"
langchain = "^0.3.27"
langgraph = "^0.6.6"
langgraph-checkpoint-postgres = "^2.0.23"
psycopg-pool = "^3.2.6"
psycopg = "^3.2.6"
sqlalchemy = "^2.0.40"
tokencost = "^0.1.26"
langchain-aws = "^0.2.21"
