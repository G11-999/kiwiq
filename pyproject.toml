langchain-community = "^0.3.24"
weaviate-client = "^4.15.3"
pymongo = "^4.11.3"
aio-pika = "^9.5.5"
pyjwt = "^2.10.1"
passlib = "^1.7.4"
fastapi-sso = "^0.18.0"
bcrypt = "^4.3.0"
argon2-cffi = "^23.1.0"
faststream = {extras = ["rabbit"], version = "^0.5.37"}
datamodel-code-generator = "^0.28.5"
prefect = "^3.4.11"
jsonschema = {extras = ["format-nongpl"], version = "^4.23.0"}
jsonpatch = "^1.33"
markitdown = {extras = ["docx", "pdf", "pptx", "xls", "xlsx"], version = "^0.1.1"}
beautifulsoup4 = "^4.13.4"
tenacity = "^9.1.2"
stripe = "^12.2.0"
langchain-perplexity = "^0.1.2"
