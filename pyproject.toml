[tool.poetry]
name = "kiwiq-ai"
version = "0.1.0"
description = "KiwiQ AI Platform"
authors = ["Your Name <your.email@example.com>"]
readme = "README.md"
package-mode = false
# packages = [{include = "global_config", from = "libs"}]

[tool.poetry.dependencies]
python = "^3.12"
fastapi = "^0.115.8"
uvicorn = "^0.27.0"
prometheus-client = "^0.19.0"
pydantic = { version = "^2.5.0", extras = ["email"] }
pydantic-settings = "^2.1.0"
structlog = "^24.1.0"
websockets = "^12.0"
python-jose = { extras = ["cryptography"], version = "^3.3.0" }
passlib = { extras = ["bcrypt"], version = "^1.7.4" }
python-json-logger = "^3.2.1"
aio-pika = "^9.5.4"
aiosmtplib = "^4.0.0"
sqlmodel = "^0.0.22"
alembic = "^1.14.1"
jinja2 = "^3.1.5"
aiosqlite = "^0.19.0"
email-validator = "^2.1.0.post1"
httpx = "^0.28.1"
pytest-asyncio = "^0.25.3"
pytest = "^8.3.4"
asyncpg = "^0.30.0"
psycopg2-binary = "^2.9.10"
stripe = "^11.5.0"
fastapi-users = { extras = ["sqlalchemy"], version = "^14.0.1" }
fastapi-users-db-sqlalchemy = ">=7.0.0"
python-multipart = "^0.0.20"
itsdangerous = "^2.2.0"
redis = { extras = ["hiredis"], version = "^5.0.1" }
msgpack = "^1.0.7"
orjson = "^3.9.15"
backoff = "^2.2.1"
prefect = "^2.14.0"
dotenv = "^0.9.9"

# Include local libraries as editable dependencies
libs = { path = "./libs", develop = true }

[tool.poetry.group.dev.dependencies]
black = "^23.12.0"
isort = "^5.13.0"
mypy = "^1.8.0"
pytest-cov = "^4.1.0"
respx = "^0.20.2"
pytest-env = "^1.1.5"

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.black]
line-length = 88
target-version = ['py312']

[tool.isort]
profile = "black"
multi_line_output = 3

[tool.pytest.ini_options]
asyncio_mode = "auto"
pythonpath = [
    ".",
    "libs",
    "services", # This will allow importing from all services
]
testpaths = [
    "services/auth/tests",
    "services/notifications/tests",
    "services/linkedin/tests",
    "services/billing/tests",
]
python_files = ["test_*.py", "*_test.py"]
addopts = "-v -s"
