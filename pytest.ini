[pytest]
# TODO: move pytest config to pyproject.toml!
pythonpath = [".", "libs", "services"]
testpaths = tests
python_files = test_*.py
asyncio_mode = auto

norecursedirs = .*          # Skip hidden directories
    build                    # Skip build output directory
    dist                     # Skip distribution directory
    CVS                      # Skip version control directories
    _darcs
    {arch}
    *.egg                    # Skip Python egg directories
    venv                     # Skip virtual environment directory

# Test markers
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests
    gateway: API Gateway tests
    logging: Logging system tests
    monitoring: Monitoring system tests

# Combined test and coverage configuration
addopts = 
    --verbose
    --strict-markers
    --tb=short
    --cov=services
    --cov-report=term-missing
    # --cov-report=html      # Generate HTML coverage report
    --cov-branch

# Logging - Configure test execution logging
; log_cli = true             # Enable live logging output
; log_cli_level = INFO       # Set minimum log level to display
; log_cli_format = %(asctime)s [%(levelname)s] %(message)s (%(filename)s:%(lineno)s)  # Define log message format
;     # Format includes: timestamp, log level, message, filename, line number
; log_cli_date_format = %Y-%m-%d %H:%M:%S   # Define timestamp format in logs
