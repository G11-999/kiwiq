[pytest]
pythonpath = .
testpaths = services/auth/tests
python_files = test_*.py
asyncio_mode = auto

# Test markers
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests
    gateway: API Gateway tests
    logging: Logging system tests
    monitoring: Monitoring system tests

# Combined test and coverage configuration
addopts = 
    --verbose
    --strict-markers
    --tb=short
    --cov=services/auth
    --cov-report=term-missing
    --cov-branch