# docker-compose-dev.yml
# Development environment Docker Compose configuration
# Run with: docker compose -f docker-compose-dev.yml up -d
# Requires a .env file in the same directory for environment variable substitution.

# version: '3.8' # Specify Docker Compose file version

services:
  # Weaviate Vector Database Service
  weaviate:
    image: semitechnologies/weaviate:latest # Use the latest official Weaviate image
    container_name: weaviate-dev          # Specific container name for dev
    restart: on-failure                   # Restart policy suitable for dev
    ports:
      - "8080:8080"                       # Map Weaviate's default HTTP port
      - "50051:50051" 
    environment:
      # Configuration via environment variables (ensure these are set in your .env file)
      QUERY_DEFAULTS_LIMIT: ${WEAVIATE_QUERY_DEFAULTS_LIMIT:-25} # Default query limit (example default)
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: ${WEAVIATE_ANONYMOUS_ACCESS_ENABLED:-true} # Allow anonymous access (dev only!)
      PERSISTENCE_DATA_PATH: '/var/lib/weaviate' # Internal path where data is stored
      ENABLE_MODULES: ${WEAVIATE_ENABLE_MODULES:-text2vec-openai,generative-openai} # Example modules
      DEFAULT_VECTORIZER_MODULE: ${WEAVIATE_DEFAULT_VECTORIZER_MODULE:-text2vec-openai} # Default vectorizer
      ASYNC_INDEXING: ${WEAVIATE_ASYNC_INDEXING:-true} # Enable async indexing
      OPENAI_APIKEY: ${OPENAI_API_KEY} # Critical: Provide your OpenAI key via .env for modules to work
      # CLUSTER_HOSTNAME: 'node1' # Only needed for clustering setups
      LOG_LEVEL: 'info' # Set log level (optional)
      LIMIT_RESOURCES: ${WEAVIATE_LIMIT_RESOURCES:-true}
      GOMEMLIMIT: ${WEAVIATE_MEMORY_LIMIT:-2048MiB}
      CLUSTER_HOSTNAME: "node1"
      RAFT_BOOTSTRAP_EXPECT: "1" 
      RAFT_ENABLE_ONE_NODE_RECOVERY: "true"
      RAFT_BOOTSTRAP_TIMEOUT: "300"
    volumes:
      - weaviate_data:/var/lib/weaviate # Mount named volume for persistence
    networks:
      - dev_network                     # Connect to the custom network

  # MongoDB Database Service
  mongo:
    image: mongo:latest                   # Use the latest official MongoDB image
    container_name: mongo-dev             # Specific container name for dev
    restart: on-failure
    ports:
      - "27017:27017"                     # Map MongoDB's default port
    environment:
      # Root user credentials (ensure these are set in your .env file)
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
    volumes:
      - mongo_data:/data/db               # Mount named volume for persistence
    networks:
      - dev_network

  # PostgreSQL Database Service
  postgres:
    image: postgres:latest                # Use the latest official PostgreSQL image
    container_name: postgres-dev          # Specific container name for dev
    restart: on-failure
    environment:
      # Database user, password, and initial database name (set in .env)
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"                       # Map PostgreSQL's default port
    volumes:
      - postgres_data:/var/lib/postgresql/data # Mount named volume for persistence
    networks:
      - dev_network

  # RabbitMQ Messaging Service (with Management UI)
  rabbitmq:
    image: rabbitmq:3-management-alpine   # Use image with Management UI (Alpine variant is smaller)
    container_name: rabbitmq-dev          # Specific container name for dev
    restart: on-failure
    ports:
      - "5672:5672"                       # Map AMQP port
      - "15672:15672"                     # Map Management UI port
    environment:
      # Default user credentials (set in .env)
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
      # Optional: Set hostname if needed for clustering or specific identification
      # RABBITMQ_NODENAME: rabbit@rabbitmq-dev
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq   # Mount named volume for persistence
    networks:
      - dev_network

  # Redis Cache/Store Service (using Redis Stack for dev tools like RedisInsight)
  redis:
    # NOTE: redis/redis-stack includes RedisInsight GUI.
    #       For production, consider using 'redis:7-alpine' for a smaller footprint.
    image: redis/redis-stack-server:latest
    container_name: redis-dev             # Specific container name for dev
    restart: on-failure
    ports:
      - "6379:6379"                       # Map Redis default port
      - "8001:8001"                       # Map RedisInsight GUI port (from redis-stack)
    command: redis-server --requirepass ${REDIS_PASSWORD} # Set password via env var (set in .env)
    volumes:
      - redis_data:/data                  # Mount named volume for persistence
    networks:
      - dev_network

  # Prefect Server Service (Orchestration API)
  prefect-server:
    image: prefecthq/prefect:3-latest     # Use the latest Prefect 3 image
    container_name: prefect-server-dev    # Specific container name for dev
    restart: on-failure
    entrypoint: ["prefect", "server", "start", "--host", "0.0.0.0", "--port", "4201"] # Ensure it listens on all interfaces inside container
    environment:
      # Database connection URL using other service names (requires postgres service)
      # Format: postgresql+driver://user:password@host:port/database
      PREFECT_API_DATABASE_CONNECTION_URL: "postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:${POSTGRES_PORT}/${PREFECT_DB}"
      # Note: this is in ~/.prefect/storage directory by default! https://docs.prefect.io/v3/develop/results
      PREFECT_TASKS_DEFAULT_PERSIST_RESULT: ${PREFECT_TASKS_DEFAULT_PERSIST_RESULT}
      # Optional: Set UI API URL if needed explicitly
      PREFECT_API_URL: "http://localhost:4201/api"
      # PREFECT_UI_API_URL: "http://prefect-server-dev:4201/api" # Example using container name
    ports:
      - "4201:4201"                       # Map Prefect Server UI/API port
    volumes:
      # Optional: Persist Prefect server data (SQLite DB if not using Postgres, logs, etc.)
      - prefect_data:/root/.prefect       # Default Prefect home directory in container
    depends_on:
      - postgres                          # Ensure postgres is started before prefect-server
    networks:
      - dev_network

 # Example Application Service
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev.app # Assumes Dockerfile.app exists
    container_name: core-app-dev
    restart: on-failure
    ports:
      - "${APP_PORT:-8000}:${APP_PORT:-8000}" # Map app port, provide default if not set in .env
    environment:
      APP_ENV: ${APP_ENV:-development} # Set application environment
      APP_PORT: ${APP_PORT:-8000}
      # Database and Service URLs (using service names)
      # Ensure these env vars match what your application expects
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: "postgres"
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DATABASES: ${POSTGRES_DATABASES}
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:${POSTGRES_PORT}/${POSTGRES_DB}"
      # /?authSource=admin" # Added authSource
      MONGO_URL: "mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongo:27017"
      RABBITMQ_URL: "amqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@rabbitmq:5672/"
      REDIS_URL: "redis://default:${REDIS_PASSWORD}@redis:6379/0" # Use 'default' user for Redis 6+
      WEAVIATE_HOST: "weaviate"
      PREFECT_API_URL: "http://prefect-server:4201/api"
      # Set PYTHONPATH if your app structure requires it
      # PYTHONPATH: /app:/app/services # Example
    volumes:
      - ./:/app # Mount application code for development (live reload)
    depends_on: # Ensure backend services are started first
      - weaviate
      - mongo
      - postgres
      - rabbitmq
      - redis
      - prefect-server
    networks:
      - dev_network

  # Prefect Agent Service (Runs flows)
  prefect-agent:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker # Assumes Dockerfile.worker exists
    container_name: prefect-agent-dev
    restart: on-failure
    depends_on:
      - prefect-server # Wait for the server API to be available
      - app
      - postgres
      - mongo
      - rabbitmq
      - redis
    environment:
      # Point agent to the server API URL (using service name)
      PREFECT_API_URL: "http://prefect-server:4201/api"
      PREFECT_LOGGING_LEVEL: INFO
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: "postgres"
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DATABASES: ${POSTGRES_DATABASES}
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:${POSTGRES_PORT}/${POSTGRES_DB}"
      # /?authSource=admin" # Added authSource
      MONGO_URL: "mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongo:27017"
      RABBITMQ_URL: "amqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@rabbitmq:5672/"
      REDIS_URL: "redis://default:${REDIS_PASSWORD}@redis:6379/0" # Use 'default' user for Redis 6+
      WEAVIATE_HOST: "weaviate"
      # Add any other env vars needed by your flows
    # Command to start the agent polling a specific work pool (replace 'default-pool' if needed)
    networks:
      - dev_network
    # Optional: Mount code if agent needs access to flow definitions locally
    volumes:
      - .:/app # Example: Mount current directory to /app

# Define named volumes for data persistence
volumes:
  weaviate_data:
  mongo_data:
  postgres_data:
  rabbitmq_data:
  redis_data:
  prefect_data:

# Define the custom network for inter-service communication
networks:
  dev_network:
    driver: bridge # Default bridge network driver
