name: Pytest Unit testing Results and Pass / Fail Label

permissions: write-all

on:
  pull_request:
    branches:
      - main

jobs:
  test-and-label:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.12]
    outputs:
      outcome: ${{ steps.run_tests.outputs.outcome }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry and Dependencies
        run: |
          pip install poetry
          poetry install

      - name: Run Pytest Custom Command and Capture Outcome
        id: run_tests
        run: |
          set +e
          PYTHONPATH=$(pwd):$(pwd)/services poetry run pytest -m unit 2>&1 | tee pytest.log
          exit_code=${PIPESTATUS[0]}
          if [ $exit_code -eq 0 ]; then
            echo "outcome=pass" >> $GITHUB_OUTPUT
          else
            echo "outcome=fail" >> $GITHUB_OUTPUT
          fi
          # Exit 0 so that subsequent steps run even if tests fail.
          exit 0
        shell: bash

      - name: Post Test Results Comment on PR
        uses: actions/github-script@v3
        with:
          script: |
            const fs = require('fs');
            const result = fs.readFileSync('pytest.log', 'utf8');
            const lines = result.trim().split('\n');
            const last25Lines = lines.slice(-25).join('\n');
            const commentBody = "### Test Results (Last 25 Lines)\n```\n" + last25Lines + "\n```";
            github.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: commentBody
            });

      - name: Tag PR as Pass or Fail Based on Test Outcome
        uses: actions/github-script@v3
        env:
          OUTCOME: ${{ steps.run_tests.outputs.outcome }}
        with:
          script: |
            const label = (process.env.OUTCOME === 'fail') ? 'fail' : 'pass';
            github.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: [label]
            });

      - name: Fail the Job if Tests Fail
        if: steps.run_tests.outputs.outcome == 'fail'
        uses: actions/github-script@v3
        with:
          script: |
            const core = require('@actions/core');
            core.setFailed('Test failures detected.');
